<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ ระบบสะสมแต้มห้องเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-[#f0f4ff] text-[#1a1a3e] min-h-screen flex flex-col transition-colors duration-200" id="body-theme">

    <header class="bg-white border-b border-[#dde4f5] p-3 flex flex-wrap items-center justify-between gap-2 id-card">
        <h1 class="text-lg font-bold text-[#4f7cff]">⭐ ระบบสะสมแต้มห้องเรียน</h1>
        <div class="flex gap-2 flex-wrap">
            <button onclick="toggleTheme()" class="border border-[#dde4f5] bg-white text-sm rounded-lg px-3 py-1.5 cursor-pointer hover:bg-[#f0f4ff]" id="theme-btn">🌙 โหมดมืด</button>
            <button onclick="toggleSetup()" class="border border-[#dde4f5] bg-white text-sm rounded-lg px-3 py-1.5 cursor-pointer hover:bg-[#f0f4ff]">🛠 ตั้งค่า URL</button>
            <button onclick="saveRoom()" id="save-btn" class="bg-[#4f7cff] text-white text-sm font-semibold rounded-lg px-4 py-1.5 cursor-pointer hover:bg-[#3b66ff]">💾 บันทึก</button>
        </div>
    </header>

    <div class="flex gap-1 bg-white border-b border-[#dde4f5] px-4 pt-2 overflow-x-auto" id="tab-bar">
        </div>

    <main class="p-4 max-w-(screen-md) mx-auto w-full flex-grow">
        
        <div id="setup-box" class="hidden bg-white border border-[#dde4f5] rounded-xl p-4 mb-4">
            <label class="text-sm font-semibold block mb-1">🔗 Web App URL (Google Apps Script)</label>
            <input type="text" id="url-input" class="w-full border border-[#dde4f5] bg-[#f8faff] rounded-lg p-2 text-sm box-border mt-1" placeholder="https://script.google.com/macros/s/.../exec">
            <div class="flex gap-2 mt-3">
                <button onclick="fetchCurrentRoom()" class="bg-[#4f7cff] text-white text-sm font-semibold rounded-lg px-4 py-1.5 cursor-pointer hover:bg-[#3b66ff]">📥 โหลดห้องนี้</button>
                <button onclick="fetchAllRooms()" class="border border-[#dde4f5] bg-white text-sm rounded-lg px-3 py-1.5 cursor-pointer hover:bg-[#f0f4ff]">📥 โหลดทุกห้อง</button>
            </div>
            <p class="text-xs text-[#7788aa] mt-2">💡 URL จะถูกบันทึกอัตโนมัติ — ไม่ต้องกรอกใหม่ทุกครั้ง</p>
        </div>

        <div class="grid grid-cols-4 gap-2.5 mb-3.5">
            <div class="bg-white border border-[#dde4f5] rounded-xl p-2.5 text-center id-card">
                <div id="stat-count" class="text-2xl font-bold text-[#4f7cff]">—</div>
                <div class="text-xs text-[#7788aa]">นักเรียน</div>
            </div>
            <div class="bg-white border border-[#dde4f5] rounded-xl p-2.5 text-center id-card">
                <div id="stat-total" class="text-2xl font-bold text-[#4f7cff]">—</div>
                <div class="text-xs text-[#7788aa]">แต้มรวม</div>
            </div>
            <div class="bg-white border border-[#dde4f5] rounded-xl p-2.5 text-center id-card">
                <div id="stat-max" class="text-2xl font-bold text-[#4f7cff]">—</div>
                <div class="text-xs text-[#7788aa]">สูงสุด</div>
            </div>
            <div class="bg-white border border-[#dde4f5] rounded-xl p-2.5 text-center id-card">
                <div id="stat-avg" class="text-2xl font-bold text-[#4f7cff]">—</div>
                <div class="text-xs text-[#7788aa]">เฉลี่ย</div>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-2 mb-3">
            <select id="sort-select" onchange="renderStudents()" class="border border-[#dde4f5] bg-white text-sm rounded-lg px-2.5 py-1.5 cursor-pointer id-card">
                <option value="number">เรียงเลขที่</option>
                <option value="name">เรียงชื่อ</option>
                <option value="score_desc">คะแนน มาก→น้อย</option>
                <option value="score_asc">คะแนน น้อย→มาก</option>
            </select>

            <div class="flex items-center gap-1.5 bg-[#e8edff] border border-[#4f7cff]/20 rounded-xl px-3 py-1.5 flex-wrap id-bulk">
                <span class="text-xs font-semibold text-[#4f7cff]">📢 ให้/ลดทั้งห้อง</span>
                <input type="number" id="bulk-amount" min="1" value="1" class="w-12 border border-[#4f7cff]/40 bg-white rounded-md p-1 text-sm text-center">
                <span class="text-xs text-[#7788aa]">แต้ม</span>
                <button onclick="bulkChange(1)" class="w-8 h-8 rounded-lg bg-[#22c87a]/10 text-[#22c87a] font-bold text-sm flex items-center justify-center cursor-pointer hover:bg-[#22c87a]/20">+</button>
                <button onclick="bulkChange(-1)" class="w-8 h-8 rounded-lg bg-[#ff5c6a]/10 text-[#ff5c6a] font-bold text-sm flex items-center justify-center cursor-pointer hover:bg-[#ff5c6a]/20">-</button>
            </div>

            <button onclick="resetRoom()" class="ml-auto bg-[#fff0f1] text-[#ff5c6a] border border-[#ff5c6a]/20 text-sm rounded-lg px-3 py-1.5 cursor-pointer hover:bg-[#fff0f1]/60">🔄 รีเซ็ตห้อง</button>
        </div>

        <div id="student-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5">
            </div>
    </main>

    <footer id="status-bar" class="bg-white border-t border-[#dde4f5] p-2 text-xs text-[#7788aa] sticky bottom-0 id-card">
        ⏳ กำลังโหลดระบบ...
    </footer>

    <script>
        const ROOMS = ["ม.1/4", "ม.1/5", "ม.1/6", "ม.1/7"];
        const STUDENT_EMOJIS = ["🧑‍🎓","👦","👧","🧒","👨‍🏫","🧑","👩","🐻","🐼","🦊","🐯","🐸","🐥","🦁","🐧","🐨","🐮","🐰","🐹","🦉"];
        
        let theme = localStorage.getItem("classroomPoints_theme") || "light";
        let webAppUrl = localStorage.getItem("classroomPoints_webAppUrl") || "";
        let allData = JSON.parse(localStorage.getItem("classroomPoints_v2")) || {};
        let activeRoom = ROOMS[0];
        let loading = false;

        function getEmoji(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return STUDENT_EMOJIS[Math.abs(hash) % STUDENT_EMOJIS.length];
        }

        function init() {
            document.getElementById("url-input").value = webAppUrl;
            applyTheme();
            renderTabs();
            renderStudents();
            updateStatus(`💾 ข้อมูลบันทึกในเครื่องอัตโนมัติ • ${activeRoom} มี ${(allData[activeRoom] || []).length} คน`);
        }

        function renderTabs() {
            const tabBar = document.getElementById("tab-bar");
            tabBar.innerHTML = "";
            ROOMS.forEach(room => {
                const btn = document.createElement("button");
                btn.innerText = room;
                btn.className = `px-4 py-2 cursor-pointer text-sm rounded-t-lg border border-b-0 transition-all ${
                    activeRoom === room 
                    ? "bg-[#f0f4ff] text-[#4f7cff] border-[#4f7cff] font-bold dark:bg-[#1a1a2e]" 
                    : "bg-white text-[#1a1a3e] border-[#dde4f5] dark:bg-[#16213e] dark:text-[#e0e0ff] dark:border-[#0f3460]"
                }`;
                btn.onclick = () => { activeRoom = room; renderTabs(); renderStudents(); };
                tabBar.appendChild(btn);
            });
        }

        function renderStudents() {
            const students = allData[activeRoom] || [];
            const grid = document.getElementById("student-grid");
            const sortVal = document.getElementById("sort-select").value;

            // คำนวณสถิติ
            const total = students.reduce((s, st) => s + (st["คะแนน"] || 0), 0);
            const max = students.length ? Math.max(...students.map(s => s["คะแนน"] || 0)) : 0;
            const avg = students.length ? (total / students.length).toFixed(1) : "—";

            document.getElementById("stat-count").innerText = students.length || "—";
            document.getElementById("stat-total").innerText = total || "—";
            document.getElementById("stat-max").innerText = students.length ? max : "—";
            document.getElementById("stat-avg").innerText = avg;

            if (students.length === 0) {
                grid.className = "block w-full text-center py-12 text-[#7788aa] bg-white border border-dashed border-[#dde4f5] rounded-xl id-card";
                grid.innerHTML = `<div class="text-4xl mb-2">🏫</div><div class="text-sm font-semibold">ยังไม่มีข้อมูลนักเรียน</div><div class="text-xs mt-1">กดปุ่ม "ตั้งค่า URL" แล้วกด "โหลดห้องนี้"</div>`;
                return;
            }

            grid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5";
            
            // เรียงลำดับข้อมูล
            let sorted = [...students];
            if (sortVal === "number") sorted.sort((a, b) => (a["เลขที่"] || 0) - (b["เลขที่"] || 0));
            else if (sortVal === "name") sorted.sort((a, b) => (a["ชื่อ-สกุล"] || "").localeCompare(b["ชื่อ-สกุล"] || "", "th"));
            else if (sortVal === "score_desc") sorted.sort((a, b) => (b["คะแนน"] || 0) - (a["คะแนน"] || 0));
            else if (sortVal === "score_asc") sorted.sort((a, b) => (a["คะแนน"] || 0) - (b["คะแนน"] || 0));

            grid.innerHTML = "";
            sorted.forEach((student) => {
                const score = student["คะแนน"] || 0;
                const name = student["ชื่อ-สกุล"] || "";
                const num = student["เลขที่"] || "—";
                const emoji = getEmoji(name);
                const isHigh = score >= max && max > 0;

                const card = document.createElement("div");
                card.className = `bg-white border rounded-xl p-3 flex flex-col items-center gap-1 transition-all id-card ${
                    isHigh ? "border-[#4f7cff] ring-2 ring-[#4f7cff]/20" : "border-[#dde4f5]"
                }`;

                card.innerHTML = `
                    <div class="text-3xl">${emoji}</div>
                    <div class="text-[11px] text-[#7788aa]">เลขที่ ${num}</div>
                    <div class="text-xs text-[#7788aa] font-medium text-center line-clamp-1">${name}</div>
                    <div class="text-2xl font-bold my-1 text-current">${score}</div>
                    <div class="flex gap-1.5 mt-1">
                        <button onclick="changeScore('${name}', ${num}, 1)" class="w-8 h-8 rounded-lg bg-[#22c87a]/10 text-[#22c87a] font-bold flex items-center justify-center cursor-pointer hover:bg-[#22c87a]/20">+</button>
                        <button onclick="changeScore('${name}', ${num}, -1)" class="w-8 h-8 rounded-lg bg-[#ff5c6a]/10 text-[#ff5c6a] font-bold flex items-center justify-center cursor-pointer hover:bg-[#ff5c6a]/20">−</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            updateStatus(`💾 ข้อมูลบันทึกในเครื่องอัตโนมัติ • ${activeRoom} มี ${students.length} คน`);
        }

        function changeScore(name, num, delta) {
            const roomData = allData[activeRoom] || [];
            const idx = roomData.findIndex(s => s["ชื่อ-สกุล"] === name && s["เลขที่"] === num);
            if (idx !== -1) {
                roomData[idx]["คะแนน"] = (roomData[idx]["คะแนน"] || 0) + delta;
                saveData();
                renderStudents();
            }
        }

        function bulkChange(multiplier) {
            const amt = (parseInt(document.getElementById("bulk-amount").value) || 1) * multiplier;
            if (allData[activeRoom]) {
                allData[activeRoom] = allData[activeRoom].map(s => ({ ...s, "คะแนน": (s["คะแนน"] || 0) + amt }));
                saveData();
                renderStudents();
            }
        }

        function resetRoom() {
            if (!confirm(`รีเซ็ตคะแนนทุกคนในห้อง ${activeRoom}?`)) return;
            if (allData[activeRoom]) {
                allData[activeRoom] = allData[activeRoom].map(s => ({ ...s, "คะแนน": 0 }));
                saveData();
                renderStudents();
            }
        }

        async function fetchRoom(room, url) {
            if (!url) { updateStatus("⚠️ กรุณากรอก Web App URL ก่อน"); return; }
            loading = true;
            updateStatus(`กำลังโหลด ${room}...`);
            try {
                const res = await fetch(`${url}?sheet=${encodeURIComponent(room)}`);
                const json = await res.json();
                if (json.error) throw new Error(json.error);
                allData[room] = json.data;
                saveData();
                updateStatus(`✅ โหลด ${room} สำเร็จ (${json.data.length} คน)`);
            } catch (e) {
                updateStatus(`❌ โหลดไม่สำเร็จ: ${e.message}`);
            }
            loading = false;
        }

        async function fetchCurrentRoom() {
            const url = document.getElementById("url-input").value.trim();
            if (!url) { updateStatus("⚠️ กรุณากรอก Web App URL ก่อน"); return; }
            webAppUrl = url;
            localStorage.setItem("classroomPoints_webAppUrl", url);
            await fetchRoom(activeRoom, url);
            renderStudents();
        }

        async function fetchAllRooms() {
            const url = document.getElementById("url-input").value.trim();
            if (!url) { updateStatus("⚠️ กรุณากรอก Web App URL ก่อน"); return; }
            webAppUrl = url;
            localStorage.setItem("classroomPoints_webAppUrl", url);
            for (const room of ROOMS) {
                await fetchRoom(room, url);
            }
            renderTabs();
            renderStudents();
            updateStatus("✅ โหลดทุกห้องเรียบร้อย");
        }

        async function saveRoom() {
            if (!webAppUrl) { updateStatus("⚠️ ยังไม่มี URL"); return; }
            const students = allData[activeRoom] || [];
            loading = true;
            updateStatus("กำลังบันทึกไปยัง Google Sheets...");
            try {
                const updates = students.map((s, i) => ({ row: i + 1, score: s["คะแนน"] || 0 }));
                const res = await fetch(webAppUrl, {
                    method: "POST",
                    body: JSON.stringify({ sheet: activeRoom, updates }),
                });
                const json = await res.json();
                if (json.success) updateStatus("✅ บันทึกสำเร็จลง Google Sheets แล้ว");
                else throw new Error(JSON.stringify(json));
            } catch (e) {
                updateStatus(`❌ บันทึกไม่สำเร็จ: ${e.message}`);
            }
            loading = false;
        }

        function saveData() { localStorage.setItem("classroomPoints_v2", JSON.stringify(allData)); }
        function updateStatus(msg) { document.getElementById("status-bar").innerText = loading ? "⏳ กำลังดำเนินการ..." : msg; }
        function toggleSetup() { document.getElementById("setup-box").classList.toggle("hidden"); }
        
        function toggleTheme() {
            theme = theme === "light" ? "dark" : "light";
            localStorage.setItem("classroomPoints_theme", theme);
            applyTheme();
            renderTabs();
        }

        function applyTheme() {
            const isDark = theme === "dark";
            const body = document.getElementById("body-theme");
            const btn = document.getElementById("theme-btn");
            
            if (isDark) {
                body.className = "bg-[#1a1a2e] text-[#e0e0ff] min-h-screen flex flex-col transition-colors duration-200";
                btn.innerText = "☀️ โหมดสว่าง";
                document.querySelectorAll(".id-card").forEach(el => el.classList.add("!bg-[#16213e]", "!border-[#0f3460]"));
                document.querySelectorAll(".id-bulk").forEach(el => el.classList.add("!bg-[#1e2a5e]", "!border-[#4f7cff]/40"));
            } else {
                body.className = "bg-[#f0f4ff] text-[#1a1a3e] min-h-screen flex flex-col transition-colors duration-200";
                btn.innerText = "🌙 โหมดมืด";
                document.querySelectorAll(".id-card").forEach(el => el.classList.remove("!bg-[#16213e]", "!border-[#0f3460]"));
                document.querySelectorAll(".id-bulk").forEach(el => el.classList.remove("!bg-[#1e2a5e]", "!border-[#4f7cff]/40"));
            }
        }

        window.onload = init;
    </script>
</body>
</html>
